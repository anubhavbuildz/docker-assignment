<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

    body {
        height: 100vh;

        max-width: 600px;
    }

    .badge {
        display: inline-block;
        padding: 8px 18px;
        border-radius: 50px;
        background: #22c55e;
        color: #000;
        font-weight: bold;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 15px;
        color: #38bdf8;
    }

    p {
        font-size: 1.1rem;
        margin-bottom: 25px;
        color: #cbd5f5;
    }

    .btn {
        display: inline-block;
        padding: 12px 25px;
        border-radius: 10px;
        text-decoration: none;
        color: #fff;
        background: #3b82f6;
        transition: 0.3s;
    }

    .btn:hover {
        background: #2563eb;
        transform: scale(1.05);
    }

    footer {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #94a3b8;
    }
</style>
